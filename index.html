<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Design for Developer</title>
    <meta
      name="description"
      content="Replica stage of the selected Figma portfolio design, including desktop and mobile views."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="assets/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="replica-shell">
      <div class="replica-orb replica-orb-a" aria-hidden="true"></div>
      <div class="replica-orb replica-orb-b" aria-hidden="true"></div>
      <div class="replica-orb replica-orb-c" aria-hidden="true"></div>

      <section class="gallery-frame">
        <div class="device-layout">
          <article class="device desktop-device">
            <div class="screen" id="desktopScreen"></div>
          </article>

          <article class="device mobile-device">
            <div class="screen screen-mobile" id="mobileScreen"></div>
          </article>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
